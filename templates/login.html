<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="https://gtsolution.vn/wp-content/uploads/bachkhoa.png" />
    <title>AI VISION GUARD - AUTHENTICATION</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <style>
      :root {
        --primary-cyan: #00e5ff;
        --bg-dark: #0a0e14;
        --card-bg: #111111;
        --input-bg: #161b22;
        --text-dim: #848d97;
        --transition: all 0.3s ease;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        background-color: var(--bg-dark);
        /* Tạo hiệu ứng lưới mờ ở nền */
        background-image: 
            linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
        background-size: 30px 30px;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      /* Container chính giống ảnh */
      .auth-card {
        background: var(--card-bg);
        width: 100%;
        max-width: 420px;
        padding: 50px 40px;
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      }

      /* Logo phía trên */
      .auth-logo {
        width: 60px;
        height: 60px;
        margin-bottom: 30px;
        filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.5));
      }

      h2 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 2px;
        margin-bottom: 40px;
        color: white;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      }

      /* Tầng Label nhỏ (Capitals) */
      .input-wrapper {
        text-align: left;
        margin-bottom: 25px;
      }

      .input-wrapper label {
        display: block;
        font-size: 11px;
        font-weight: 800;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 12px;
      }

      /* Ô nhập liệu tối */
      .input-field {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-field i {
        position: absolute;
        left: 20px;
        color: var(--text-dim);
        font-size: 16px;
      }

      .input-field input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid #21262d;
        border-radius: 16px;
        padding: 18px 20px 18px 55px;
        color: white;
        font-size: 15px;
        outline: none;
        transition: var(--transition);
      }

      .input-field input:focus {
        border-color: var(--primary-cyan);
        box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
      }

      /* Hiện mật khẩu */
      .toggle-area {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: -15px;
        margin-bottom: 30px;
        cursor: pointer;
      }

      .toggle-area input {
        accent-color: var(--primary-cyan);
        width: 16px;
        height: 16px;
      }

      .toggle-area span {
        font-size: 12px;
        color: var(--text-dim);
        font-weight: 600;
      }

      /* NÚT XÁC THỰC RỰC RỠ */
      .btn-auth {
        width: 100%;
        background: var(--primary-cyan);
        color: black;
        border: none;
        border-radius: 18px;
        padding: 20px;
        font-size: 15px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: var(--transition);
        box-shadow: 0 10px 25px rgba(0, 229, 255, 0.3);
      }

      .btn-auth:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(0, 229, 255, 0.5);
      }

      /* Link quay lại Portal */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 35px;
        text-decoration: none;
        color: var(--text-dim);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: var(--transition);
      }

      .back-link:hover {
        color: white;
      }

      /* Thông báo lỗi */
      .error-msg {
        background: rgba(255, 107, 107, 0.1);
        color: #ff6b6b;
        padding: 12px;
        border-radius: 12px;
        font-size: 12px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 107, 107, 0.2);
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <!-- Logo giả lập giống ảnh -->
      <img src="https://gtsolution.vn/wp-content/uploads/bachkhoa.png" class="auth-logo" alt="Logo" />
      
      <h2>AI VISION GUARD</h2>

      <form method="post" id="loginForm">
        {% csrf_token %}

        {% if form.errors %}
        <div class="error-msg">
          <i class="fas fa-shield-alt"></i> Thông tin xác thực không chính xác!
        </div>
        {% endif %}

        <!-- Identity -->
        <div class="input-wrapper">
          <label>ACCESS IDENTITY</label>
          <div class="input-field">
            <i class="fas fa-user-secret"></i>
            {{ form.username }}
          </div>
        </div>

        <!-- Security Key -->
        <div class="input-wrapper">
          <label>SECURITY KEY</label>
          <div class="input-field">
            <i class="fas fa-fingerprint"></i>
            {{ form.password }}
          </div>
        </div>

        <!-- Hiện mật khẩu -->
        <label class="toggle-area">
          <input type="checkbox" id="showToggle" />
          <span>HIỂN THỊ MẬT MÃ</span>
        </label>

        <!-- Nút bấm xác thực -->
        <button type="submit" class="btn-auth">
          XÁC THỰC TRUY CẬP <i class="fas fa-chevron-right"></i>
        </button>
      </form>

      <a href="/" class="back-link">
        <i class="fas fa-arrow-left"></i> QUAY LẠI PORTAL
      </a>
      
      <div style="margin-top: 30px; font-size: 10px; color: #333; letter-spacing: 2px;">
        ENCRYPTED_SESSION_V2.0
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const userInput = document.querySelector('input[name="username"]');
        const passInput = document.querySelector('input[type="password"]');
        const showToggle = document.getElementById("showToggle");

        // 1. Tự động điền dữ liệu theo yêu cầu
        if (userInput) {
          userInput.value = "guest";
          userInput.placeholder = "Tên đăng nhập";
        }
        if (passInput) {
          passInput.value = "pass12345";
          passInput.placeholder = "Mật khẩu bảo mật";
          // Đảm bảo ID cho input mật khẩu
          if (!passInput.id) passInput.id = "id_password";
        }

        // 2. Xử lý hiện/ẩn mật mã
        if (showToggle && passInput) {
          showToggle.addEventListener("change", function () {
            passInput.type = this.checked ? "text" : "password";
          });
        }
      });
    </script>
  </body>
</html>
